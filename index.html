<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEO CHAMELEON | Retro-Futuristic Arcade</title>
  <!-- Retro Monospace Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cabinet-outer">
    <div class="arcade-cabinet">
      <!-- Cabinet Header -->
      <div class="cabinet-marquee">
        <h1 class="glow-text">NEO CHAMELEON</h1>
        <div class="marquee-sub">8-BIT RETRO SYNTH</div>
        <button id="info-toggle-btn" class="info-toggle-btn">HELP</button>
      </div>

      <!-- Main CRT Monitor Container -->
      <div class="screen-outer">
        <div class="screen-bezel">
          <!-- Ambient reflections & highlights on bezel -->
          <div class="bezel-highlight-top"></div>
          <div class="bezel-highlight-bottom"></div>
          
          <div class="crt-container" id="crt-screen">
            <!-- Curvature Reflection Overlay -->
            <div class="screen-glass-curve"></div>
            <!-- CRT Scanlines Overlay -->
            <div class="scanlines" id="scanlines-layer"></div>
            <!-- Screen Flicker and Glow Overlay -->
            <div class="screen-flicker"></div>
            <div class="screen-vignette"></div>

            <!-- Canvas Element -->
            <canvas id="game-canvas" width="256" height="240"></canvas>
            
            <!-- Turn on/off overlay simulation -->
            <div class="screen-static" id="power-static"></div>
          </div>
        </div>
      </div>

      <!-- Game Boy Control Panel -->
      <div class="gameboy-panel">
        <div class="gb-header">
          <span class="gb-logo">GAME CHAMELEON</span>
          <div class="gb-header-lines"><span></span><span></span></div>
        </div>

        <div class="gb-controls-grid">
          <!-- Left side: D-Pad -->
          <div class="gb-dpad-container">
            <div class="gb-dpad">
              <button class="gb-dpad-btn up" id="gb-dpad-up" aria-label="Up"></button>
              <button class="gb-dpad-btn right" id="gb-dpad-right" aria-label="Right"></button>
              <button class="gb-dpad-btn down" id="gb-dpad-down" aria-label="Down"></button>
              <button class="gb-dpad-btn left" id="gb-dpad-left" aria-label="Left"></button>
              <div class="gb-dpad-center"></div>
            </div>
          </div>

          <!-- Center: System Buttons -->
          <div class="gb-system-buttons">
            <div class="gb-sys-btn-wrapper">
              <button class="gb-sys-btn" id="gb-select-btn" aria-label="Select"></button>
              <span class="gb-sys-label">SELECT</span>
            </div>
            <div class="gb-sys-btn-wrapper">
              <button class="gb-sys-btn" id="gb-start-btn" aria-label="Start"></button>
              <span class="gb-sys-label">START</span>
            </div>
          </div>

          <!-- Right side: Action Buttons -->
          <div class="gb-action-buttons">
            <div class="gb-action-wrapper">
              <button class="gb-action-btn button-b" id="gb-btn-b"><span>B</span></button>
            </div>
            <div class="gb-action-wrapper">
              <button class="gb-action-btn button-a" id="gb-btn-a"><span>A</span></button>
            </div>
          </div>
        </div>

        <!-- Bottom right speaker grill -->
        <div class="gb-speaker">
          <div class="speaker-grill"></div>
          <div class="speaker-grill"></div>
          <div class="speaker-grill"></div>
          <div class="speaker-grill"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Instruction Panels / Side HUD -->
  <div class="instructions-panel" id="instructions-modal">
    <div class="instructions-header">
      <h3>CONTROLS</h3>
      <button class="modal-close-btn" id="info-close-btn">&times;</button>
    </div>
    <ul>
      <li><span class="key">▲</span><span class="key">▼</span> / <span class="key">W</span><span class="key">S</span> : 角度調整 (十字キー上下)</li>
      <li><span class="key">SPACE</span> / <span class="key">A / B ボタン</span> : 舌を伸ばす</li>
      <li>クリックした位置を直接狙うことも可能です！</li>
    </ul>
    <div class="bug-legend">
      <h4>BUGS INFO</h4>
      <div class="legend-item" data-bug-type="common">
        <canvas class="bug-legend-icon" width="32" height="32" aria-hidden="true"></canvas>
        <span class="legend-score"></span>
        <span class="legend-label"></span>
      </div>
      <div class="legend-item" data-bug-type="gnat">
        <canvas class="bug-legend-icon" width="32" height="32" aria-hidden="true"></canvas>
        <span class="legend-score"></span>
        <span class="legend-label"></span>
      </div>
      <div class="legend-item" data-bug-type="firefly">
        <canvas class="bug-legend-icon" width="32" height="32" aria-hidden="true"></canvas>
        <span class="legend-score"></span>
        <span class="legend-label"></span>
      </div>
      <div class="legend-item" data-bug-type="wasp">
        <canvas class="bug-legend-icon" width="32" height="32" aria-hidden="true"></canvas>
        <span class="legend-score"></span>
        <span class="legend-label"></span>
      </div>
    </div>
  </div>

  <!-- Settings Panel / Modal -->
  <div class="instructions-panel" id="settings-modal">
    <div class="instructions-header">
      <h3>SETTINGS</h3>
      <button class="modal-close-btn" id="settings-close-btn">&times;</button>
    </div>
    <div class="settings-content">
      <div class="switch-container">
        <span class="switch-label">CRT SCANLINES</span>
        <label class="toggle-switch">
          <input type="checkbox" id="scanline-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="switch-container">
        <span class="switch-label">BGM MUSIC</span>
        <label class="toggle-switch">
          <input type="checkbox" id="music-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="volume-container">
        <div class="volume-header">
          <span class="switch-label">BGM VOLUME</span>
          <span class="volume-value" id="bgm-volume-value">30%</span>
        </div>
        <input type="range" id="bgm-volume-slider" class="volume-slider" min="0" max="100" value="30" aria-label="BGM volume">
      </div>
      <div class="switch-container">
        <span class="switch-label">SFX SOUND</span>
        <label class="toggle-switch">
          <input type="checkbox" id="sfx-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="volume-container">
        <div class="volume-header">
          <span class="switch-label">SFX VOLUME</span>
          <span class="volume-value" id="sfx-volume-value">50%</span>
        </div>
        <input type="range" id="sfx-volume-slider" class="volume-slider" min="0" max="100" value="50" aria-label="SFX volume">
      </div>
    </div>
  </div>

  <!-- Game Scripts -->
  <script src="audio.js"></script>
  <script src="chameleon.js"></script>
  <script src="bugs.js"></script>
  <script src="game.js"></script>
</body>
</html>
